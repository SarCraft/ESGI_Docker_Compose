services:
  web:
    build:
      context: ./web
    ports:
      - "8080:80"
    networks:
      - frontend
    depends_on:
      - api

  api:
    build:
      context: ./api
    env_file:
      - .env
    environment:
      DB_HOST: db
    networks:
      - frontend
      - backend
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  db_data:

networks:
  frontend:
  backend:
