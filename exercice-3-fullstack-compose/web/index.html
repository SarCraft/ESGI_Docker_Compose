<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TP Compose Exercice 3</title>
    <style>
      :root {
        --bg: linear-gradient(140deg, #0f172a, #1d4ed8 45%, #f59e0b);
        --card: rgba(255, 255, 255, 0.9);
        --text: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", sans-serif;
        background: var(--bg);
      }

      main {
        width: min(92vw, 52rem);
        padding: 2.5rem;
        border-radius: 1.5rem;
        background: var(--card);
        color: var(--text);
        box-shadow: 0 20px 70px rgba(15, 23, 42, 0.3);
      }

      h1 {
        margin-top: 0;
        font-size: 2.4rem;
      }

      pre {
        padding: 1rem;
        border-radius: 1rem;
        background: #0f172a;
        color: #e2e8f0;
        overflow: auto;
      }

      button {
        padding: 0.85rem 1.1rem;
        border: 0;
        border-radius: 999px;
        background: #1d4ed8;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Architecture front + api + db</h1>
      <p>Le navigateur ne parle qu'au front Nginx. Le front appelle ensuite l'API sur le reseau interne.</p>
      <button id="load">Tester la stack</button>
      <pre id="output">Clique sur le bouton pour appeler /api/health puis /api/message.</pre>
    </main>

    <script>
      const output = document.getElementById('output')
      const button = document.getElementById('load')

      button.addEventListener('click', async () => {
        output.textContent = 'Chargement...'

        try {
          const [health, message] = await Promise.all([
            fetch('/api/health').then((res) => res.json()),
            fetch('/api/message').then((res) => res.json()),
          ])

          output.textContent = JSON.stringify({ health, message }, null, 2)
        }
        catch (error) {
          output.textContent = `Erreur: ${error.message}`
        }
      })
    </script>
  </body>
</html>
