<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TP Compose Exercice 1</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #f6f0e8, #dce9f8);
        color: #1f2937;
      }

      main {
        max-width: 42rem;
        padding: 3rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 60px rgba(31, 41, 55, 0.15);
      }

      h1 {
        margin-top: 0;
        font-size: 2.6rem;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
      }

      code {
        padding: 0.1rem 0.35rem;
        border-radius: 0.35rem;
        background: #eef2ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Docker Compose - Exercice 1</h1>
      <p>Cette page est servie par une image Nginx construite localement via <code>compose.yaml</code>.</p>
      <p>Objectif: verifier qu'un premier service peut etre build, lance, observe puis arrete avec Docker Compose.</p>
    </main>
  </body>
</html>
